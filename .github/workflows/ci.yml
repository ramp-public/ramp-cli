name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - run: uv sync --frozen --group dev

      - run: .venv/bin/pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - run: uv sync --frozen --group dev

      - run: .venv/bin/pytest tests/ -v

      - name: No Path(__file__) outside specs module
        run: |
          if grep -rn 'Path(__file__)' src/ramp_cli/ --include='*.py' | grep -v 'specs/__init__.py'; then
            echo "::error::Path(__file__) found outside specs module. Use ramp_cli.specs constants instead."
            exit 1
          fi
